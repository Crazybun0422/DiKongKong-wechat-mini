<svg xmlns="http://www.w3.org/2000/svg" width="520" height="694" viewBox="0 0 520 694">
  <defs>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7.2" flood-color="#FFFFFF" flood-opacity="0.38"/>
      <feDropShadow dx="0" dy="16.8" stdDeviation="16.8" flood-color="#1B255A" flood-opacity="0.20"/>
    </filter>

    <filter id="outerGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="frameStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B7B2FF"/>
      <stop offset="0.55" stop-color="#A9D6FF"/>
      <stop offset="1" stop-color="#C9B8FF"/>
    </linearGradient>

    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F8FF"/>
    </linearGradient>

    <linearGradient id="innerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#F3F6FF"/>
    </linearGradient>

    <linearGradient id="slotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F5FF"/>
    </linearGradient>

    <linearGradient id="centerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE9A8"/>
      <stop offset="1" stop-color="#FFD56A"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="slotShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2.4" stdDeviation="2.4" flood-color="#23306B" flood-opacity="0.12"/>
    </filter>

    <filter id="centerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="7.2" stdDeviation="9.6" flood-color="#FFD56A" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7.2" flood-color="#FFFFFF" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <!-- 外框整体扩大 1.2x（不使用 scale），并居中到画布内 -->
    <rect x="3.2" y="36.2" width="513.6" height="621.6" rx="40.8"
          fill="none" stroke="url(#frameStroke)" stroke-width="24"
          stroke-opacity="0.55" filter="url(#outerGlow)"/>

    <rect x="3.2" y="36.2" width="513.6" height="621.6" rx="40.8"
          fill="url(#innerBg)" stroke="url(#frameStroke)" stroke-width="19.2"/>

    <rect x="15.2" y="48.2" width="489.6" height="597.6" rx="33.6"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="2.4"/>

    <path d="M34.4 72.2
             C56.0 53.0, 89.6 45.8, 125.6 45.8
             H221.6
             C152.0 67.4, 87.2 91.4, 46.4 115.4
             C36.8 120.2, 32.0 115.4, 32.0 108.2
             V84.2
             C32.0 79.4, 32.0 77.0, 34.4 72.2Z"
          fill="url(#shine)"/>

    <!-- 抽奖卡片等比扩大 -->
    <rect x="20.0" y="79.4" width="480.0" height="532.8" rx="31.2"
          fill="url(#bodyGrad)" stroke="#E7EBFF" stroke-width="2.4"/>

    <rect x="32.0" y="91.4" width="456.0" height="508.8" rx="26.4"
          fill="url(#innerBg)" opacity="0.38"/>

    <!-- 3x3 格子等比扩大 -->
    <g filter="url(#slotShadow)">
      <!-- row 1 -->
      <rect x="41.6"  y="110.6" width="134.4" height="144.0" rx="21.6" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.4"/>
      <rect x="192.8" y="110.6" width="134.4" height="144.0" rx="21.6" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.4"/>
      <rect x="344.0" y="110.6" width="134.4" height="144.0" rx="21.6" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.4"/>

      <!-- row 2 -->
      <rect x="41.6"  y="273.8" width="134.4" height="144.0" rx="21.6" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.4"/>

      <g filter="url(#centerGlow)">
        <rect x="185.6" y="266.6" width="148.8" height="158.4" rx="24.0"
              fill="url(#centerGrad)" stroke="#FFD06B" stroke-width="2.4"/>
      </g>

      <rect x="344.0" y="273.8" width="134.4" height="144.0" rx="21.6" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.4"/>

      <!-- row 3 -->
      <rect x="41.6"  y="437.0" width="134.4" height="144.0" rx="21.6" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.4"/>
      <rect x="192.8" y="437.0" width="134.4" height="144.0" rx="21.6" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.4"/>
      <rect x="344.0" y="437.0" width="134.4" height="144.0" rx="21.6" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.4"/>
    </g>
  </g>
</svg>
