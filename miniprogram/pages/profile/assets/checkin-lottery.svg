<svg xmlns="http://www.w3.org/2000/svg" width="624" height="832.8" viewBox="-48 -48 720 928.8">
  <defs>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8.64" flood-color="#FFFFFF" flood-opacity="0.38"/>
      <feDropShadow dx="0" dy="20.16" stdDeviation="20.16" flood-color="#1B255A" flood-opacity="0.20"/>
    </filter>

    <filter id="outerGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8.64" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="frameStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B7B2FF"/>
      <stop offset="0.55" stop-color="#A9D6FF"/>
      <stop offset="1" stop-color="#C9B8FF"/>
    </linearGradient>

    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6F8FF"/>
    </linearGradient>

    <linearGradient id="innerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#F3F6FF"/>
    </linearGradient>

    <linearGradient id="slotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F5FF"/>
    </linearGradient>

    <linearGradient id="centerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE9A8"/>
      <stop offset="1" stop-color="#FFD56A"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="slotShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2.88" stdDeviation="2.88" flood-color="#23306B" flood-opacity="0.12"/>
    </filter>

    <filter id="centerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8.64" stdDeviation="11.52" flood-color="#FFD56A" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8.64" flood-color="#FFFFFF" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <!-- 彩色边框：已在放大基础上额外 +10 -->
    <rect x="3.84" y="43.44" width="616.32" height="745.92" rx="48.96"
          fill="none" stroke="url(#frameStroke)" stroke-width="38.8"
          stroke-opacity="0.55" filter="url(#outerGlow)"/>

    <rect x="3.84" y="43.44" width="616.32" height="745.92" rx="48.96"
          fill="url(#innerBg)" stroke="url(#frameStroke)" stroke-width="33.04"/>

    <rect x="18.24" y="57.84" width="587.52" height="717.12" rx="40.32"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="2.88"/>

    <path d="M41.28 86.64
             C67.20 63.60, 107.52 54.96, 150.72 54.96
             H265.92
             C182.40 80.88, 104.64 109.68, 55.68 138.48
             C44.16 144.24, 38.40 138.48, 38.40 129.84
             V101.04
             C38.40 95.28, 38.40 92.40, 41.28 86.64Z"
          fill="url(#shine)"/>

    <rect x="24.00" y="95.28" width="576.00" height="639.36" rx="37.44"
          fill="url(#bodyGrad)" stroke="#E7EBFF" stroke-width="2.88"/>

    <rect x="38.40" y="109.68" width="547.20" height="610.56" rx="31.68"
          fill="url(#innerBg)" opacity="0.38"/>

    <g filter="url(#slotShadow)">
      <rect x="49.92"  y="132.72" width="161.28" height="172.80" rx="25.92" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.88"/>
      <rect x="231.36" y="132.72" width="161.28" height="172.80" rx="25.92" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.88"/>
      <rect x="412.80" y="132.72" width="161.28" height="172.80" rx="25.92" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.88"/>

      <rect x="49.92"  y="328.56" width="161.28" height="172.80" rx="25.92" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.88"/>

      <g filter="url(#centerGlow)">
        <rect x="222.72" y="319.92" width="178.56" height="190.08" rx="28.80"
              fill="url(#centerGrad)" stroke="#FFD06B" stroke-width="2.88"/>
      </g>

      <rect x="412.80" y="328.56" width="161.28" height="172.80" rx="25.92" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.88"/>

      <rect x="49.92"  y="524.40" width="161.28" height="172.80" rx="25.92" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.88"/>
      <rect x="231.36" y="524.40" width="161.28" height="172.80" rx="25.92" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.88"/>
      <rect x="412.80" y="524.40" width="161.28" height="172.80" rx="25.92" fill="url(#slotGrad)" stroke="#E6ECFF" stroke-width="2.88"/>
    </g>
  </g>
</svg>
