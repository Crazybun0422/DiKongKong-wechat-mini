<svg xmlns="http://www.w3.org/2000/svg" width="624" height="932.8" viewBox="-48 -48 720 1028.8">
  <defs>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8.64" flood-color="#FFFFFF" flood-opacity="0.38"/>
      <feDropShadow dx="0" dy="20.16" stdDeviation="20.16" flood-color="#1B255A" flood-opacity="0.20"/>
    </filter>

    <filter id="outerGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8.64" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="frameStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#0C3BFF"/>
      <stop offset="0.16" stop-color="#2D86FF"/>
      <stop offset="0.34" stop-color="#66E7FF"/>
      <stop offset="0.50" stop-color="#E9FDFF"/>
      <stop offset="0.62" stop-color="#4FB9FF"/>
      <stop offset="0.78" stop-color="#6A5BFF"/>
      <stop offset="1"    stop-color="#0B2E7A"/>
    </linearGradient>

    <linearGradient id="frameStrokeSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#2D86FF"/>
      <stop offset="0.32" stop-color="#7EF0FF"/>
      <stop offset="0.54" stop-color="#FFFFFF"/>
      <stop offset="0.76" stop-color="#63C8FF"/>
      <stop offset="1"    stop-color="#3E57FF"/>
    </linearGradient>

    <path id="cardRect" d="
      M 52.8 43.44
      H 571.2
      A 48.96 48.96 0 0 1 620.16 92.4
      V 840.4
      A 48.96 48.96 0 0 1 571.2 889.36
      H 52.8
      A 48.96 48.96 0 0 1 3.84 840.4
      V 92.4
      A 48.96 48.96 0 0 1 52.8 43.44
      Z
    "/>

    <!-- ✅ 矩形整体往右移动 100rpx：x 360 -> 460 -->
    <mask id="cutTopRight" maskUnits="userSpaceOnUse" x="-200" y="-200" width="1200" height="1400">
      <rect x="-200" y="-200" width="1200" height="1400" fill="white"/>
      <rect x="460" y="-10" width="340" height="260" rx="70" fill="black"/>
    </mask>
  </defs>

  <g filter="url(#cardShadow)" mask="url(#cutTopRight)">
    <use href="#cardRect"
      fill="none"
      stroke="url(#frameStroke)"
      stroke-width="48.8"
      stroke-opacity="0.58"
      stroke-linejoin="round"
      filter="url(#outerGlow)"
    />

    <use href="#cardRect"
      fill="#FFFFFF"
      stroke="url(#frameStroke)"
      stroke-width="43.04"
      stroke-linejoin="round"
    />

    <use href="#cardRect"
      fill="none"
      stroke="url(#frameStrokeSoft)"
      stroke-opacity="0.85"
      stroke-width="3.2"
      stroke-linejoin="round"
    />
  </g>


</svg>
