openapi: 3.0.1
info:
  title: 配置管理 APIs
  description: 管理后台中的配置项接口，所有配置在数据库中仅保留一条记录。
  version: 1.0.0
servers:
  - url: /api
paths:
  /api/config/invite:
    get:
      summary: 获取拉新管理配置
      description: 普通用户可读取，返回好友注册与标记奖励配置；数据库中始终只有一条配置记录。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInviteConfigResponse'
    put:
      summary: 创建或更新拉新管理配置
      description: 仅管理员可调用，用于创建或更新唯一的拉新管理配置记录。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteConfigRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInviteConfigResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/map-settlement:
    get:
      summary: 获取地图入驻配置
      description: 普通用户可读取，返回与微信支付和 FLP 余额相关的价格配置；数据库中仅维护一条记录。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMapSettlementConfigResponse'
    put:
      summary: 创建或更新地图入驻配置
      description: 仅管理员可调用，用于创建或更新唯一的地图入驻配置记录。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapSettlementConfigRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMapSettlementConfigResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/open-platform-copy:
    get:
      summary: 获取开放平台文案
      description: 普通用户可读取，返回开放平台的富文本文案内容；数据库中仅维护一条记录。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOpenPlatformCopyResponse'
    put:
      summary: 创建或更新开放平台文案
      description: 仅管理员可调用，用于创建或更新唯一的开放平台文案记录。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenPlatformCopyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOpenPlatformCopyResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/font-file:
    get:
      summary: 获取最新字体文件配置
      description: 普通用户可读取，返回最新上传的字体文件名与版本号；数据库中仅维护一条记录。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFontFileConfigResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    post:
      summary: 上传并配置字体文件
      description: 仅管理员可调用，上传字体文件并保存文件名与版本号。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - version
              properties:
                file:
                  type: string
                  format: binary
                  description: 字体文件本体。
                version:
                  type: string
                  description: 字体文件版本号。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFontFileConfigResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/invite-guide:
    get:
      summary: 获取邀请攻略文案
      description: 普通用户可读取，返回邀请攻略的富文本文案内容；数据库中仅维护一条记录。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInviteGuideResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    put:
      summary: 创建或更新邀请攻略文案
      description: 仅管理员可调用，用于创建或更新唯一的邀请攻略文案记录。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteGuideRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseInviteGuideResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/flp-reward-help:
    get:
      summary: 获取 FLP 奖励机制帮助文案
      description: 用户管理员（ADMIN 或 OPERATOR）需携带管理员 token 才能读取该富文本内容，数据库中仅维护一条记录。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFlpRewardHelpResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    put:
      summary: 创建或更新 FLP 奖励机制帮助文案
      description: 仅 ADMIN 角色管理员可调用，用于创建或更新唯一的帮助文案记录。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlpRewardHelpRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFlpRewardHelpResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/template-settings:
    get:
      summary: 获取模版设置列表
      description: 管理员与普通用户均可调用，返回模版名称到模版配置（包含模版 ID 与详情数组）的映射；当未配置任何模版时返回空对象和空更新时间。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTemplateSettingsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    post:
      summary: 新增或更新模版设置
      description: 仅管理员可调用，创建或覆盖单个模版名称对应的模版 ID 及详情，并返回最新的模版设置集合。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateSettingRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTemplateSettingsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/template-settings/{templateName}:
    put:
      summary: 更新指定模版设置
      description: 仅管理员可调用，根据路径中的模版名称更新或覆盖其模版 ID 与详情，返回最新的模版设置集合。
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: templateName
          required: true
          schema:
            type: string
          description: 模版名称。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateSettingRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTemplateSettingsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    delete:
      summary: 删除指定模版设置
      description: 仅管理员可调用，删除对应模版名称的配置；当删除后没有任何模版时返回空对象和空更新时间。
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: templateName
          required: true
          schema:
            type: string
          description: 模版名称。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTemplateSettingsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/pin-review-reward:
    get:
      summary: 获取 Pin 审核奖励配置
      description: 普通用户可读取，返回不同审核结果对应的 FLP 奖励配置；数据库中仅维护一条记录。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePinReviewRewardConfigResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    put:
      summary: 创建或更新 Pin 审核奖励配置
      description: 仅管理员可调用，用于创建或更新唯一的 Pin 审核奖励配置记录。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinReviewRewardConfigRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePinReviewRewardConfigResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/config/wechat-pay:
    get:
      summary: 获取微信支付配置
      description: 仅管理员可读取，返回微信小程序支付所需的商户与回调配置，数据库中仅保留一条记录。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWechatPayConfigResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    put:
      summary: 创建或更新微信支付配置
      description: 仅管理员可调用，用于创建或更新唯一的微信支付配置记录。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatPayConfigRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWechatPayConfigResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    delete:
      summary: 删除微信支付配置
      description: 仅管理员可调用，用于删除唯一的微信支付配置记录。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    InviteConfigRequest:
      type: object
      required:
        - friendRegisterRewardFlp
        - friendFirstMarkerFlp
      properties:
        friendRegisterRewardFlp:
          type: number
          format: double
          description: 好友注册成功时给予的 FLP 奖励点数。
        friendFirstMarkerFlp:
          type: number
          format: double
          description: 好友首次标记时给予的 FLP 奖励点数。
    InviteConfigResponse:
      allOf:
        - $ref: '#/components/schemas/InviteConfigRequest'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: 配置最后更新时间。
    ApiResponseInviteConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/InviteConfigResponse'
    MapSettlementConfigRequest:
      type: object
      required:
        - wechatListPrice
        - wechatNetPrice
        - flpListPrice
        - flpNetPrice
      properties:
        wechatListPrice:
          type: number
          format: double
          description: 微信支付划线价。
        wechatNetPrice:
          type: number
          format: double
          description: 微信师傅实收价。
        flpListPrice:
          type: number
          format: double
          description: FLP 余额划线价。
        flpNetPrice:
          type: number
          format: double
          description: FLP 余额实收价。
    MapSettlementConfigResponse:
      allOf:
        - $ref: '#/components/schemas/MapSettlementConfigRequest'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: 配置最后更新时间。
    ApiResponseMapSettlementConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/MapSettlementConfigResponse'
    OpenPlatformCopyRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: 开放平台富文本文案。
    OpenPlatformCopyResponse:
      allOf:
        - $ref: '#/components/schemas/OpenPlatformCopyRequest'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: 配置最后更新时间。
    ApiResponseOpenPlatformCopyResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/OpenPlatformCopyResponse'
    FontFileConfigResponse:
      type: object
      properties:
        fileName:
          type: string
          description: 字体文件在存储中的对象名称。
        version:
          type: string
          description: 字体文件版本号。
    ApiResponseFontFileConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/FontFileConfigResponse'
    InviteGuideRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: 邀请攻略富文本文案。
    InviteGuideResponse:
      allOf:
        - $ref: '#/components/schemas/InviteGuideRequest'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: 配置最后更新时间。
    ApiResponseInviteGuideResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/InviteGuideResponse'
    FlpRewardHelpRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: FLP 奖励机制帮助富文本文案。
    FlpRewardHelpResponse:
      allOf:
        - $ref: '#/components/schemas/FlpRewardHelpRequest'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: 配置最后更新时间。
    ApiResponseFlpRewardHelpResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/FlpRewardHelpResponse'
    TemplateSettingRequest:
      type: object
      required:
        - templateName
        - templateId
      properties:
        templateName:
          type: string
          description: 模版名称，作为键存储。
        templateId:
          type: string
          description: 模版 ID，作为值存储。
        page:
          type: string
          nullable: true
          description: 订阅消息跳转的页面路径，传空则不包含跳转。
        details:
          type: array
          nullable: true
          description: 当前模版的详情字段列表，可为空；每个元素包含展示名称和对应的 value（实际发送给微信接口的字段名）。
          items:
            $ref: '#/components/schemas/TemplateDetailEntry'
    TemplateSettingsResponse:
      type: object
      properties:
        templates:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/TemplateSettingDetail'
          description: 模版名称到模版配置的映射；当未设置时为空对象。
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: 配置最后更新时间，若无数据则为空。
    TemplateSettingDetail:
      type: object
      properties:
        templateId:
          type: string
          description: 模版 ID。
        page:
          type: string
          nullable: true
          description: 订阅消息跳转页面。
        details:
          type: array
          items:
            $ref: '#/components/schemas/TemplateDetailEntry'
          description: 当前模版的详情列表（包含字段与 value 键值对），未配置时为空数组。
    ApiResponseTemplateSettingsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/TemplateSettingsResponse'
    TemplateDetailEntry:
      type: object
      properties:
        field:
          type: string
          description: 模版字段的展示名称。
        value:
          type: string
          description: 模版字段对应的 value，将作为键发送给微信接口。
    PinReviewRewardConfigRequest:
      type: object
      required:
        - approvedARewardFlp
        - approvedBRewardFlp
      properties:
        approvedARewardFlp:
          type: number
          format: double
          description: Pin 审核通过 A 级时发放的 FLP 数量。
        approvedBRewardFlp:
          type: number
          format: double
          description: Pin 审核通过 B 级时发放的 FLP 数量。
    PinReviewRewardConfigResponse:
      allOf:
        - $ref: '#/components/schemas/PinReviewRewardConfigRequest'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: 配置最后更新时间。
    ApiResponsePinReviewRewardConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/PinReviewRewardConfigResponse'
    WechatPayConfigRequest:
      type: object
      required:
        - mchId
        - privateKeyPath
        - certificateSerialNumber
        - apiV3Key
        - callbackUrl
      properties:
        mchId:
          type: string
          description: 微信支付商户号。
        privateKeyPath:
          type: string
          description: 商户 API 私钥证书路径。
        certificateSerialNumber:
          type: string
          description: 商户证书序列号。
        apiV3Key:
          type: string
