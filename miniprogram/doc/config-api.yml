components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    InviteConfigRequest:
      type: object
      required:
        - friendRegisterRewardFlp
        - friendFirstMarkerFlp
      properties:
        friendRegisterRewardFlp:
          type: number
          format: double
          description: 好友注册成功时给予的 FLP 奖励点数。
        friendFirstMarkerFlp:
          type: number
          format: double
          description: 好友首次标记时给予的 FLP 奖励点数。
    InviteConfigResponse:
      allOf:
        - $ref: '#/components/schemas/InviteConfigRequest'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: 配置最后更新时间。
    ApiResponseInviteConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/InviteConfigResponse'
    MapSettlementConfigRequest:
      type: object
      required:
        - wechatListPrice
        - wechatNetPrice
        - flpListPrice
        - flpNetPrice
      properties:
        wechatListPrice:
          type: number
          format: double
          description: 微信支付划线价。
        wechatNetPrice:
          type: number
          format: double
          description: 微信师傅实收价。
        flpListPrice:
          type: number
          format: double
          description: FLP 余额划线价。
        flpNetPrice:
          type: number
          format: double
          description: FLP 余额实收价。
    MapSettlementConfigResponse:
      allOf:
        - $ref: '#/components/schemas/MapSettlementConfigRequest'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: 配置最后更新时间。
    ApiResponseMapSettlementConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/MapSettlementConfigResponse'
    PlanetMerchantAdvancedGuideRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: 星球商户进阶攻略富文本文案。
