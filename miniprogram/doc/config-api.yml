  /api/config/easter-egg-resource/latest/download:
    get:
      summary: 下载最新彩蛋游戏资源包（支持分段下载）
      description: |
        管理员和普通用户均可调用，下载当前最新版本的资源包文件（附件流）。

        - 不带 `Range` 请求头时，返回完整文件（`200 OK`）。
        - 带单段 `Range`（如 `bytes=0-1048575`）时，返回分段文件（`206 Partial Content`）。
        - 当前仅支持**单段范围请求**；多段或非法范围返回 `416 Requested Range Not Satisfiable`。
        - 若运行环境无法透传 `Range` 请求头，也可使用查询参数 `start/end`（闭区间）请求分段。
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Range
          required: false
          schema:
            type: string
          description: |
            可选的字节范围请求头。示例：
            - `bytes=0-1048575`
            - `bytes=1048576-`
            - `bytes=-1024`
        - in: query
          name: start
          required: false
          schema:
            type: integer
            format: int64
          description: 分段下载起始字节（闭区间，需与 `end` 搭配或单独使用）。
        - in: query
          name: end
          required: false
          schema:
            type: integer
            format: int64
          description: 分段下载结束字节（闭区间，需与 `start` 搭配或单独使用）。
      responses:
        '200':
          description: 返回完整文件流。
          headers:
            Accept-Ranges:
              description: 服务端支持字节范围请求。
              schema:
                type: string
                example: bytes
            Content-Disposition:
              description: 附件下载文件名。
              schema:
                type: string
            Content-Length:
              description: 完整文件大小（字节）。
              schema:
                type: integer
                format: int64
            X-Total-Size:
              description: 文件总大小（字节），用于客户端兜底获取总长度。
              schema:
                type: string
                example: "8388608"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: 返回指定范围的文件分段。
          headers:
            Accept-Ranges:
              description: 服务端支持字节范围请求。
              schema:
                type: string
                example: bytes
            Content-Range:
              description: 当前返回分段的范围与总大小。
              schema:
                type: string
                example: bytes 0-1048575/8388608
            Content-Disposition:
              description: 附件下载文件名。
              schema:
                type: string
            Content-Length:
              description: 当前分段大小（字节）。
              schema:
                type: integer
                format: int64
            X-Total-Size:
              description: 文件总大小（字节），用于客户端兜底获取总长度。
              schema:
                type: string
                example: "8388608"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '416':
          description: 请求的 Range 不可满足（非法范围或多段范围）。
          headers:
            Content-Range:
              description: 不可满足范围提示。
              schema:
                type: string
                example: bytes */*
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'

