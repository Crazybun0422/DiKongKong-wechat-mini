openapi: 3.0.1
info:
  title: 适飞区 KMZ 信息接口
  description: 提供管理员新增适飞区 KMZ 信息以及用户端读取能力。
  version: 1.0.0
servers:
  - url: /
paths:
  /api/admin/suitable-fly-zone-kmz-infos:
    get:
      summary: 读取适飞区 KMZ 信息（管理员）
      description: 仅管理员可调用，按创建时间倒序返回适飞区 KMZ 信息列表。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSuitableFlyZoneKmzInfoResponseList'
        '401':
          description: 未授权

    post:
      summary: 新增适飞区 KMZ 信息（管理员）
      description: |
        仅管理员可调用。
        `attachmentName` 字段填写上传文件后的附件名称（实际文件上传流程见文件上传接口文档）。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuitableFlyZoneKmzInfoRequest'
      responses:
        '200':
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSuitableFlyZoneKmzInfoResponse'
        '400':
          description: 参数错误
        '401':
          description: 未授权

  /api/suitable-fly-zone-kmz-infos:
    get:
      summary: 读取适飞区 KMZ 信息（用户）
      description: 用户端读取适飞区 KMZ 信息列表，按创建时间倒序返回。
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSuitableFlyZoneKmzInfoResponseList'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuitableFlyZoneKmzInfoRequest:
      type: object
      required:
        - name
        - version
        - attachmentName
        - description
      properties:
        name:
          type: string
          description: 名称
        version:
          type: string
          description: 版本
        attachmentName:
          type: string
          description: 附件名称（上传后文件名）
        description:
          type: string
          description: 说明

    SuitableFlyZoneKmzInfoResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        attachmentName:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time

    ApiResponseSuitableFlyZoneKmzInfoResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/SuitableFlyZoneKmzInfoResponse'

    ApiResponseSuitableFlyZoneKmzInfoResponseList:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/SuitableFlyZoneKmzInfoResponse'
