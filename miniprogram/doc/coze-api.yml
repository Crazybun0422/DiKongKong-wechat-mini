openapi: 3.0.1
info:
  title: Coze APIs
  description: Coze 工作流调用接口（地址反查当地派出所电话）
  version: 1.0.0
servers:
  - url: /api
paths:
  /api/coze/police-station-phone:
    post:
      summary: 根据地址反查当地派出所电话
      description: |
        输入一个地址字符串，服务端会调用 Coze 工作流：
        - `space_id` 由配置 `coze.apis.police-phone.space-id` 提供（放在 Coze 请求 body）
        - `workflow_id` 由配置 `coze.apis.police-phone.workflow-id` 提供（放在 Coze 请求 body）
        接口使用服务令牌（`coze.service-token`）进行鉴权。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CozePolicePhoneRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMap'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMap'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMap'

components:
  schemas:
    CozePolicePhoneRequest:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: 地址反查字符串
          example: 北京市朝阳区建国路93号万达广场

    ApiResponseMap:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: object
          additionalProperties:
            type: string
          example:
            zh: 成功
            en: Success
        data:
          type: object
          description: Coze 工作流原始返回结果
          additionalProperties: true
