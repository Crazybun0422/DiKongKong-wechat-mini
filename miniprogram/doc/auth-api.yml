openapi: 3.0.1
info:
  title: Auth APIs
  description: 管理员与普通用户的注册、登录以及个人资料接口。
  version: 1.0.0
servers:
  - url: /api
security:
  - bearerAuth: []
paths:
  /api/auth/register:
    post:
      summary: 注册管理员
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/auth/login:
    post:
      summary: 登录获取JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
  /api/auth/profile:
    get:
      summary: 获取管理员资料
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminProfileResponse'
  /api/admin/users:
    get:
      summary: 分页获取所有普通用户
      description: 仅管理员可调用，根据注册时间排序返回普通用户列表，默认按注册时间倒序排列。
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
          description: 页码，从 0 开始。
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
          description: 每页数量，默认 20。
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [ASC, DESC]
          description: 注册时间排序方向，默认 DESC。
        - in: query
          name: flp
          schema:
            type: string
            enum: [ASC, DESC]
          description: 按 FLP 余额排序方向，传入时会覆盖注册时间排序，默认不排序。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserSummaryPageResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/admin/users/search:
    get:
      summary: 按关键字搜索普通用户
      description: 仅管理员可调用，对用户名或 featureCode 进行模糊匹配并返回结果列表。
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          required: true
          description: 用于匹配用户名或 featureCode 的关键字。
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
          description: 页码，从 0 开始。
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
          description: 每页数量，默认 20。
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [ASC, DESC]
          description: 注册时间排序方向，默认 DESC。
        - in: query
          name: flp
          schema:
            type: string
            enum: [ASC, DESC]
          description: 按 FLP 余额排序方向，传入时会覆盖注册时间排序，默认不排序。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserSummaryPageResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/admin/users/checkins:
    get:
      summary: 分页获取用户本周签到统计
      description: 仅管理员可调用，返回用户本周连签天数与本周签到时间列表。
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
          description: 页码，从 0 开始。
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
          description: 每页数量，默认 20。
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [ASC, DESC]
          description: 注册时间排序方向，默认 DESC。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCheckinStatsPageResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/admin/users/newbie-tasks:
    get:
      summary: 分页获取用户新手任务完成情况
      description: 仅管理员可调用，返回每位用户的新手任务完成状态。
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
          description: 页码，从 0 开始。
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
          description: 每页数量，默认 20。
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [ASC, DESC]
          description: 注册时间排序方向，默认 DESC。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseNewbieTaskStatusPageResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    put:
      summary: 修改管理员资料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAdminProfileResponse'
  /api/auth/weapp/config:
    get:
      summary: 获取小程序相关密钥（含地图 map-key）
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWeappConfigResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    post:
      summary: 设置小程序相关密钥（含地图 map-key）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeappConfigRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/user/register:
    post:
      summary: 注册普通用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/user/login:
    post:
      summary: 用户登录获取JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthResponse'
  /api/user/profile:
    get:
      summary: 获取用户资料
      description: 返回用户基础信息、收到的点赞总数、从 FLP 余额表读取的 flpBalance 虚拟代币余额，以及用户分别最新访问的协议/隐私版本记录。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfileResponse'
    put:
      summary: 修改用户资料
      description: 可选择更新用户名、邮箱、手机号及头像，FLP 点数需通过专用接口调整，无法在此处修改。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateProfileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserProfileResponse'
  /api/weapp/login:
    post:
      summary: 小程序用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeappLoginRequest'
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWeappLoginResponse'
  /api/weapp/config/map-key:
    get:
      summary: 用户读取小程序地图 map-key
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWeappMapKeyResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/weapp/qrcode:
    post:
      summary: 获取小程序二维码
      description: 返回当前用户的小程序二维码 Base64 数据。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeappQrcodeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWeappQrcodeResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/weapp/poster-invite:
    post:
      summary: 获取小程序海报
      description: 返回当前用户的小程序海报 PNG 文件流。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeappQrcodeRequest'
      responses:
        '200':
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/weapp/poster-invite/status:
    get:
      summary: 查询邀请海报状态
      description: 判断当前用户是否需要重新生成邀请海报，并返回上次生成时的头像和昵称。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWeappPosterStatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/weapp/poster-merchant:
    post:
      summary: 生成商户海报
      description: 返回当前用户的商户海报 PNG 文件流。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeappMerchantPosterRequest'
      responses:
        '200':
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/weapp/poster-merchant/status:
    post:
      summary: 查询商户海报状态
      description: 判断当前用户是否需要重新生成商户海报，并返回上次生成时的数据。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeappMerchantPosterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWeappMerchantPosterStatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    UpdateProfileRequest:
      type: object
      properties:
        email:
          type: string
        avatarUrl:
          type: string
    UserRegisterRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        inviteCode:
          type: string
    UserUpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
    AdminProfileResponse:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
        avatarUrl:
          type: string
        email:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        loginSeq:
          type: string
    UserProfileResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        featureCode:
          type: string
        status:
          type: string
          description: 用户状态，例如 NORMAL、BANNED。
        online:
          type: boolean
          description: 是否在线。
        flpBalance:
          type: number
          format: double
          description: 当前账户 FLP 余额。
        inviteCode:
          type: string
          description: 绑定的 8 位邀请码。
        likeCount:
          type: integer
          format: int64
          description: 用户收到的点赞总数（包含标记与图钉）。
        policyAccessRecords:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/UserPolicyAccessRecordResponse'
          description: 用户各协议类型最新访问记录，key 为 privacy 或 terms。
    UserPolicyAccessRecordResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: 访问记录对应的用户 ID。
        featureCode:
          type: string
          description: 访问记录对应的低空号。
        agreementType:
          type: string
          description: 协议类型（privacy / terms）。
        version:
          type: string
          description: 协议版本号。
        acceptedAt:
          type: string
          format: date-time
          description: 服务端记录的接受时间。
        clientReportedAt:
          type: string
          format: date-time
          nullable: true
          description: 客户端上报的接受时间。
        scene:
          type: string
          nullable: true
          description: 触发场景。
        platform:
          type: string
          nullable: true
          description: 平台标识。
        appVersion:
          type: string
          nullable: true
          description: 小程序版本号。
        deviceInfo:
          type: string
          nullable: true
          description: 设备信息。
        ip:
          type: string
          nullable: true
          description: 服务端记录的 IP 地址。
        userAgent:
          type: string
          nullable: true
          description: 服务端记录的 User-Agent。
        docHash:
          type: string
          nullable: true
          description: 协议正文 hash。
    UserSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        featureCode:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
          description: 用户注册时间。
        flpBalance:
          type: number
          format: double
          description: 用户当前的 FLP 点数余额。
        policyAccessRecords:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/UserPolicyAccessRecordResponse'
          description: 用户各协议类型最新访问记录，key 为 privacy 或 terms。
    UserSummaryPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserSummaryResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    CheckinStatsResponse:
      type: object
      properties:
        featureCode:
          type: string
          description: 低空号。
        username:
          type: string
          description: 用户昵称。
        avatarUrl:
          type: string
          description: 用户头像。
        registeredAt:
          type: string
          format: date-time
          description: 注册时间。
        weeklyContinuousDays:
          type: integer
          description: 本周连签天数。
        checkinTimes:
          type: array
          description: 本周签到时间列表。
          items:
            type: string
            format: date-time
    CheckinStatsPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CheckinStatsResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    NewbieTaskCompletionResponse:
      type: object
      properties:
        index:
          type: integer
          description: 任务序号。
        name:
          type: string
          description: 任务名称。
        completed:
          type: boolean
          description: 是否完成。
    NewbieTaskStatusResponse:
      type: object
      properties:
        featureCode:
          type: string
          description: 低空号。
        username:
          type: string
          description: 用户昵称。
        avatarUrl:
          type: string
          description: 用户头像。
        registeredAt:
          type: string
          format: date-time
          description: 注册时间。
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/NewbieTaskCompletionResponse'
    NewbieTaskStatusPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NewbieTaskStatusResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    ApiResponseAdminProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/AdminProfileResponse'
    ApiResponseAuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/AuthResponse'
    ApiResponseUserProfileResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/UserProfileResponse'
    ApiResponseUserSummaryPageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/UserSummaryPageResponse'
    ApiResponseCheckinStatsPageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/CheckinStatsPageResponse'
    ApiResponseNewbieTaskStatusPageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/NewbieTaskStatusPageResponse'
    ApiResponseWeappLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
        data:
          $ref: '#/components/schemas/WeappLoginResponse'
    ApiResponseWeappQrcodeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/WeappQrcodeResponse'
    ApiResponseWeappPosterStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/WeappPosterStatusResponse'
    ApiResponseWeappMerchantPosterStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/WeappMerchantPosterStatusResponse'
    WeappLoginRequest:
      type: object
      properties:
        code:
          type: string
        nickname:
          type: string
        avatarUrl:
          type: string
        inviteCode:
          type: string
          description: 新用户注册时填写的邀请码，可选。
    WeappLoginResponse:
      type: object
      properties:
