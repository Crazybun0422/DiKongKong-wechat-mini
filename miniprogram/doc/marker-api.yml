openapi: 3.0.1
info:
  title: Marker APIs
  description: 用户和管理员维护地图标记的接口。
  version: 1.0.0
servers:
  - url: /api
security:
  - bearerAuth: []
paths:
  /api/markers:
    post:
      summary: 新增标记
      description: 普通用户根据自身 feature code 创建标记，管理员不支持该接口。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    get:
      summary: 分页查询标记
      description: 普通用户仅能查询自己 feature code 下的标记，管理员返回全部标记。
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
          description: 页码，从 0 开始。
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
          description: 每页条数，默认 10。
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, PENDING, APPROVED, REJECTED]
          description: 根据审核状态筛选标记，可选参数。
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [ASC, DESC]
          description: 根据创建时间排序的方向，可选参数，默认 DESC（最新在前）。
        - in: query
          name: draft
          schema:
            type: boolean
            default: false
          description: 是否仅返回草稿数据。true 时仅返回 reviewStatus=DRAFT 的记录。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerPageResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/draft:
    post:
      summary: 新增草稿标记
      description: 用户上传商户标记草稿，保存后 reviewStatus="DRAFT"。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/nearby:
    get:
      summary: 查询附近标记
      description: 任意用户查询指定经纬度方圆 N 公里内已支付且审核通过的标记，接口无需登录即可访问。
      security: []
      parameters:
        - in: query
          name: latitude
          required: true
          schema:
            type: number
            format: double
          description: 查询中心点的纬度。
        - in: query
          name: longitude
          required: true
          schema:
            type: number
            format: double
          description: 查询中心点的经度。
        - in: query
          name: radiusInKilometers
          required: true
          schema:
            type: number
            format: double
            minimum: 0
          description: 查询半径（公里）。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerList'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/{markId}/renew:
    post:
      summary: 商户标记续费
      description: 用户根据支付模式（WECHAT/FLP）与商户新 ID（markId）发起续费。微信续费走原支付回调；FLP 续费会立即扣款并按续期规则增加到期时间。
      parameters:
        - in: path
          name: markId
          required: true
          schema:
            type: integer
            format: int64
          description: 商户标记的新自增 ID（markIdNew）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkerRenewRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerRenewResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: 无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: 标记不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/search:
    get:
      summary: 搜索标记（支持已审核与草稿）
      description: 默认搜索已审核通过（APPROVED）标记；当 status=DRAFT 时仅搜索当前登录用户自己的草稿数据。
      security: []
      parameters:
        - in: query
          name: keyword
          required: true
          schema:
            type: string
          description: 搜索关键字，不能为空。
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          description: 返回结果条数上限，默认 20，最大 50。
        - in: query
          name: status
          schema:
            type: string
            enum: [APPROVED, DRAFT]
          description: 搜索状态，默认 APPROVED。选择 DRAFT 时需要登录。
        - in: query
          name: paid
          schema:
            type: boolean
          description: 仅在 status=APPROVED 时生效；true 表示付费商户，false 表示普通用户。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerList'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/pending/count:
    get:
      summary: 查询待审核标记总数
      description: 仅管理员可调用，返回待审核状态（PENDING）标记的数量。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerCountResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: 无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/{id}:
    get:
      summary: 获取已审核并付款的标记详情
      description: 根据标记 ID 获取详情，仅返回已支付且审核通过的标记，接口无需登录即可访问。
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 标记 ID（支持旧的 Mongo _id 或新的自增 markId）。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerResponse'
        '400':
          description: 标记未审核通过或未付款
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: 标记不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    put:
      summary: 修改标记
      description: 普通用户仅能修改自己 feature code 下的标记，管理员可修改任意标记。
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 标记 ID（支持旧的 Mongo _id 或新的自增 markId）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkerRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: 无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: 标记不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    delete:
      summary: 删除标记
      description: 普通用户仅能删除自己 feature code 下的标记，管理员可删除任意标记。
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 标记 ID（支持旧的 Mongo _id 或新的自增 markId）。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: 无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: 标记不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/{id}/review:
    post:
      summary: 管理员审核标记
      description: 仅管理员可调用，修改标记的审核状态。
      operationId: reviewMarker
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 标记 ID（支持旧的 Mongo _id 或新的自增 markId）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkerReviewRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: 无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: 标记不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/{id}/exposure:
    post:
      summary: 标记曝光次数 +1
      description: 公开接口，根据标记 ID 将曝光次数自增 1 并返回最新指标。
      operationId: incrementMarkerExposure
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 标记 ID（支持旧的 Mongo _id 或新的自增 markId）。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerMetricsResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: 标记不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/markers/{id}/phone-call:
    post:
      summary: 标记拨打电话次数 +1
      description: 公开接口，根据标记 ID 将拨打电话次数自增 1 并返回最新指标。
      operationId: incrementMarkerPhoneCall
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: 标记 ID（支持旧的 Mongo _id 或新的自增 markId）。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMarkerMetricsResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: 标记不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    MarkerRequest:
      type: object
      required:
        - images
        - name
        - location
        - phone
        - description
        - businessLicense
      properties:
        images:
          type: array
          description: 图片 URL 列表。
          items:
            type: string
        name:
          type: string
          description: 标记名称。
        location:
          $ref: '#/components/schemas/MarkerLocationDto'
        phone:
          type: string
          description: 联系电话。
        description:
          type: string
          description: 标记简介。
        businessLicense:
          type: string
          description: 营业执照图片 URL。
        industryHonorTags:
          type: array
          description: 行业荣誉标签列表。
          items:
            type: string
        attachmentUrls:
          type: array
          description: 附件 URL 列表。
          items:
            type: string
        qrCodeUrls:
          type: array
          description: 二维码 URL 列表。
          items:
            type: string
        videoChannelId:
          type: string
          description: 视频号 ID。
        videoId:
          type: string
          description: 视频 ID。
        videoLink:
          type: string
          description: 视频外链 URL。
        isSCos:
          type: boolean
          default: false
          description: 资源是否存在存储桶，默认 false。
        adminInfo:
          $ref: '#/components/schemas/MarkerAdminInfoDto'
    MarkerResponse:
      allOf:
        - $ref: '#/components/schemas/MarkerRequest'
        - type: object
          properties:
            id:
              type: string
              description: 旧的 Mongo _id，保持原样返回。
            markIdNew:
              type: integer
              format: int64
              description: 新的自增标记 ID（供新版本使用）。
            featureCode:
              type: string
            reviewStatus:
              type: string
              description: 审核状态，可取 DRAFT/PENDING/APPROVED/REJECTED。
              enum:
                - DRAFT
                - PENDING
                - APPROVED
                - REJECTED
            reviewRejectDetail:
              type: string
              nullable: true
              description: 驳回详情，仅当 reviewStatus=REJECTED 时可能返回。
            paid:
              type: boolean
              description: 付款标志，仅在 FLP 抵扣或微信支付成功后变为 true；系统会在每日 2 点（东八区）检查到期并自动回收为 false。
            expireAtSeconds:
              type: integer
              format: int64
              description: 商户付费到期时间（秒级时间戳，东八区）。支付成功后：若为空/0/已过期则按当前东八区时间+1年；未过期则在原到期时间基础上+1年。
            exposureCount:
              type: integer
              format: int64
              description: 标记被曝光的次数。
            phoneCallCount:
              type: integer
              format: int64
              description: 标记被拨打电话的次数。
            creatorName:
              type: string
              description: 创建者用户名。
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    MarkerRenewRequest:
      type: object
      required:
        - paymentMode
      properties:
        paymentMode:
          type: string
          enum: [WECHAT, FLP]
          description: 续费支付模式。
    MarkerRenewResponse:
      type: object
      properties:
        paymentMode:
          type: string
          enum: [WECHAT, FLP]
        wechatPrepay:
          $ref: '#/components/schemas/WechatPrepayPayload'
          nullable: true
        flpPay:
          $ref: '#/components/schemas/FlpPayPayload'
          nullable: true
    WechatPrepayPayload:
      type: object
      properties:
        orderId:
          type: string
        appId:
          type: string
        timeStamp:
          type: string
        nonceStr:
          type: string
        packageValue:
          type: string
        signType:
          type: string
        paySign:
          type: string
    FlpPayPayload:
      type: object
      properties:
        orderId:
          type: string
        orderNumber:
          type: string
        amount:
          type: number
        remainingBalance:
          type: number
    MarkerReviewRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: 审核状态，可取 PENDING/APPROVED/REJECTED。
          enum:
            - PENDING
            - APPROVED
            - REJECTED
        rejectDetail:
          type: string
          nullable: true
          description: 驳回详情，当 status=REJECTED 时建议填写。
    MarkerLocationDto:
      type: object
      required:
        - text
        - latitude
        - longitude
      properties:
        text:
          type: string
          description: 位置字符串描述。
        latitude:
          type: number
          format: double
          description: 纬度。
        longitude:
          type: number
          format: double
          description: 经度。
    MarkerAdminInfoDto:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        phone:
          type: string
    PageResponseMarkerResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/MarkerResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    ApiResponseMarkerRenewResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/MarkerRenewResponse'
    ApiResponseMarkerResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/MarkerResponse'
    ApiResponseMarkerPageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/PageResponseMarkerResponse'
    ApiResponseMarkerList:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/MarkerResponse'
    ApiResponseMarkerCountResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/MarkerCountResponse'
    ApiResponseMarkerMetricsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/MarkerMetricsResponse'
    ApiResponseVoid:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          nullable: true
          description: 始终为 null。
    ApiResponseObject:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          nullable: true
          description: 错误响应时为空。
    MarkerCountResponse:
      type: object
      properties:
        count:
          type: integer
          format: int64
    MarkerMetricsResponse:
      type: object
      properties:
        exposureCount:
          type: integer
          format: int64
          description: 标记被曝光的总次数。
        phoneCallCount:
          type: integer
          format: int64
          description: 标记被拨打电话的总次数。
