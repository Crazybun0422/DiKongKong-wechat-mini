openapi: 3.0.1
info:
  title: Lottery APIs
  description: Lottery configuration and draw APIs.
  version: 1.0.0
servers:
  - url: /api
security:
  - bearerAuth: []
paths:
  /api/lottery/config:
    get:
      summary: Get lottery configuration
      description: Requires admin or user auth. Returns the configured prize tiers.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLotteryConfigResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    put:
      summary: Update lottery configuration
      description: Admin only. Requires exactly 8 prize entries with levels 1-8.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LotteryConfigRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLotteryConfigResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/lottery/draw:
    post:
      summary: Draw lottery prize
      description: User auth required. Only available on Sundays for users with 7 consecutive days of check-ins.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLotteryDrawResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/lottery/logs:
    get:
      summary: Paginated lottery draw logs
      description: |
        - Admin calls can view all logs and filter by `featureCode`.
        - Regular users can only view their own logs; the `featureCode` query parameter is ignored.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
          description: Page index starting from 0.
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
          description: Page size.
        - in: query
          name: featureCode
          schema:
            type: string
          description: Filter by user feature code (admin only).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageLotteryLogResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponseLotteryConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/LotteryConfigResponse'
    ApiResponseLotteryDrawResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/LotteryDrawResponse'
    ApiResponseObject:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          nullable: true
          description: Null when an error occurs.
    LotteryLogResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        featureCode:
          type: string
        username:
          type: string
        prizeDescription:
          type: string
        message:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
    PageLotteryLogResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/LotteryLogResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    ApiResponsePageLotteryLogResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/PageLotteryLogResponse'
    LotteryConfigRequest:
      type: object
      properties:
        prizes:
          type: array
          minItems: 8
          maxItems: 8
          items:
            $ref: '#/components/schemas/LotteryPrizeConfigEntry'
    LotteryConfigResponse:
      type: object
      properties:
        prizes:
          type: array
          items:
            $ref: '#/components/schemas/LotteryPrizeConfigEntry'
        updatedAt:
          type: string
          format: date-time
    LotteryDrawResponse:
      type: object
      properties:
        prizeLevel:
          type: integer
          description: Prize tier level from 1 to 8.
        flp:
          type: boolean
          description: Whether the prize is an FLP reward.
        flpCount:
          type: number
          format: decimal
          nullable: true
          description: Required when `flp` is true.
        description:
          type: string
          description: Required when `flp` is false.
        imageUrl:
          type: string
          description: Required when `flp` is false.
    LotteryPrizeConfigEntry:
      type: object
      properties:
        level:
          type: integer
          description: Prize tier level from 1 to 8.
        flp:
          type: boolean
          description: Whether the prize is an FLP reward.
        flpCount:
          type: number
          format: decimal
          nullable: true
          description: Required when `flp` is true.
        description:
          type: string
          description: Required when `flp` is false.
        imageUrl:
          type: string
          description: Required when `flp` is false.
        probability:
          type: number
          format: decimal
      required:
        - level
        - flp
        - probability
