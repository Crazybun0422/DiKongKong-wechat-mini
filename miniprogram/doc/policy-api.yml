openapi: 3.0.1
info:
  title: 用户协议与隐私政策 APIs
  description: 用户协议、隐私政策的版本化管理，以及用户已访问版本记录接口。
  version: 1.0.0
servers:
  - url: /api
paths:
  /api/policies/user-agreements/latest:
    get:
      summary: 读取最新用户协议
      description: 用户直接读取最新用户协议；当无数据时返回 success=true 且 data=null。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePolicyContentResponse'

  /api/policies/privacy-policies/latest:
    get:
      summary: 读取最新隐私政策
      description: 用户直接读取最新隐私政策；当无数据时返回 success=true 且 data=null。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePolicyContentResponse'

  /api/policies/user-agreements:
    get:
      summary: 管理员获取用户协议列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePolicyContentResponseList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    post:
      summary: 管理员新增用户协议版本
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyContentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePolicyContentResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'

  /api/policies/user-agreements/{id}:
    put:
      summary: 管理员修改用户协议版本
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyContentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePolicyContentResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    delete:
      summary: 管理员删除用户协议版本
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/policies/user-agreements/{id}/pdf:
    get:
      summary: 管理员下载用户协议 PDF
      description: 将富文本协议内容转换为 PDF 并下载。
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found

  /api/policies/privacy-policies:
    get:
      summary: 管理员获取隐私政策列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePolicyContentResponseList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    post:
      summary: 管理员新增隐私政策版本
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyContentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePolicyContentResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'

  /api/policies/privacy-policies/{id}:
    put:
      summary: 管理员修改隐私政策版本
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyContentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePolicyContentResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
    delete:
      summary: 管理员删除隐私政策版本
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
  /api/policies/privacy-policies/{id}/pdf:
    get:
      summary: 管理员下载隐私政策 PDF
      description: 将富文本隐私政策转换为 PDF 并下载。
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found

  /api/policies/access-record/latest:
    get:
      summary: 读取用户最新访问记录
      description: 返回用户最新一次协议访问记录；没有记录时 data=null。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserPolicyAccessRecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'

  /api/policies/access-record:
    post:
      summary: 写入用户协议访问记录
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPolicyAccessRecordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUserPolicyAccessRecordResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseObject'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PolicyContentRequest:
      type: object
      required:
        - version
        - content
      properties:
        version:
          type: string
          description: 协议/政策版本号。
        content:
          type: string
          description: 协议/政策正文内容。

    PolicyContentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        version:
          type: string
        content:
          type: string
        docHash:
          type: string
          description: 协议正文 SHA-256 hash。
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserPolicyAccessRecordRequest:
      type: object
      required:
        - agreementType
        - version
      properties:
        agreementType:
          type: string
          description: 协议类型（privacy / terms）。
        version:
          type: string
          description: 协议版本号。
        clientReportedAt:
          type: string
          format: date-time
          nullable: true
          description: 客户端上报时间。
        scene:
          type: string
          nullable: true
          description: 触发场景（首次启动/功能入口/更新弹窗）。
        platform:
          type: string
          nullable: true
          description: 平台标识（wx/qq/pc-wechat 等）。
        appVersion:
          type: string
          nullable: true
          description: 小程序版本号。
        deviceInfo:
          type: string
          nullable: true
          description: 设备信息（系统、机型、基础库版本等）。
        docHash:
          type: string
          nullable: true
          description: 协议正文 hash，建议使用服务端返回值。

    UserPolicyAccessRecordResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        featureCode:
          type: string
        agreementType:
          type: string
        version:
          type: string
        acceptedAt:
          type: string
          format: date-time
        clientReportedAt:
          type: string
          format: date-time
          nullable: true
        scene:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        appVersion:
          type: string
          nullable: true
        deviceInfo:
          type: string
          nullable: true
        ip:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        docHash:
          type: string
          nullable: true

    ApiResponsePolicyContentResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/PolicyContentResponse'
          nullable: true

    ApiResponsePolicyContentResponseList:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/PolicyContentResponse'

    ApiResponseUserPolicyAccessRecordResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          $ref: '#/components/schemas/UserPolicyAccessRecordResponse'
          nullable: true

    ApiResponseObject:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: object
          additionalProperties:
            type: string
        data:
          nullable: true
